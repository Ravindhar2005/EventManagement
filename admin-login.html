<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Event Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="background">
    <nav>
        <ul class="navbar">
            <li><a href="index.html">Home</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="#">My Bookings</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="admin-login.html">Admin Login</a></li>
        </ul>
    </nav>

    <section class="admin-login">
        <h1>Admin Login</h1>
        <form id="login-form">
            <label for="username">Username:</label>
            <input type="text" id="username" required>
            <label for="password">Password:</label>
            <input type="password" id="password" required>
            <button type="submit">Login</button>
        </form>

        <a href="index.html" id="forgot-password">Forgot Password?</a>

    </section>

    <script>
        let login_form = document.getElementById('login-form');

        login_form.addEventListener('submit', function(event) {
            //giving the event prevent default action
            event.preventDefault();
            //retrieving the values from the username and password fields
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            //checking if the username and password are correct?
            if (username === 'ravindhar' && password === '12345') {
                localStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'admin_dashboard.html';
                alert('Login successfull ravindhar');
            } else {
                alert('Invalid username or password.');
            }
        });

        //creating a variable for forgot password for following works..
        let forgot_password = document.getElementById('forgot-password')
        // here using the variable which is created above this code..
        forgot_password.addEventListener('click', function(e) {
            e.preventDefault();
            alert('Forgot your password? Contact admin at info@nigazhi.com for assistance.');
        });
        //alert is the popup message in the front end..
        //e means it carries all the details of the event...
        //preventDefault used here for the safety purpose to prevent any unnecessary actions while the event..
    </script>
</body>
</html>
