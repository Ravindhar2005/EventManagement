<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery page</title>
    <link rel="stylesheet" href="gallery.css">
</head>
<body>
    <nav>
        <ul class="navbar">
            <li><a href="index.html">Home</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="index.html#services">Service</a></li>
            <li><a href="index.html#contact">Contact</a></li>
            <div class="login">
                <li class="adminlog" style="display: non;"><a href="admin-login.html" >Admin Login</a></li>
            </div>
        </ul>
    </nav>
    <section>  
        <center>
            <h1>EVENT GALLERY</h1>
        </center>
    </section>

    

    <h2>Gallery</h2>
<div id="gallery"></div>

<script>
fetch("/images")
  .then(res => res.json())
  .then(images => {
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = '';

    if (!images.length) {
      gallery.innerHTML = '<p class="empty-message">No gallery images have been uploaded yet.</p>';
      return;
    }

    images.forEach(img => {
      const card = document.createElement('div');
      card.className = 'gallery-card';

      const imageElement = document.createElement('img');
      imageElement.src = img;
      imageElement.alt = 'Event photo';

      const content = document.createElement('div');
      content.className = 'gallery-card-content';

      const title = document.createElement('h3');
      title.className = 'gallery-card-title';
      title.textContent = 'Event Photo';

      const tag = document.createElement('span');
      tag.className = 'gallery-card-type';
      tag.textContent = 'Gallery';

      const desc = document.createElement('p');
      desc.className = 'gallery-card-desc';
      desc.textContent = 'Uploaded event photo from admin dashboard.';

      content.appendChild(title);
      content.appendChild(tag);
      content.appendChild(desc);
      card.appendChild(imageElement);
      card.appendChild(content);
      gallery.appendChild(card);
    });
  })
  .catch(() => {
    document.getElementById('gallery').innerHTML = '<p class="empty-message">Unable to load gallery images.</p>';
  });
</script>
</body>
</html>
